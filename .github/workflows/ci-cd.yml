name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run HTML hint (basic check)
        run: |
          echo "Lint step - check files"
          ls -la

  build:
    needs: linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/visit-site:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}/visit-site:latest
